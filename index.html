<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        .main{
            border: 1px solid #ccc;
            width: 90%;

            border-radius: 12px;

            margin-top: 10px;

</head>

    </div>
  
  
  <script>
function myFun(){

        document.write(a + " x "+ b + " = " + a * b + "<br>");

    }

}

  </script>
  
</body>
</html>
